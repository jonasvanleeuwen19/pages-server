<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{instance_name} - {status_text} {title_text}</title>
  <link rel="icon" href="{favicon_url}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {{
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #2a2a2a 0%, #171717 100%);
      color: #ffffff;
    }}
    .panel {{
      max-width: 640px;
      background: rgba(38, 38, 38, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 1rem;
    }}
    .logo {{
      width: 500px;
      object-fit: contain;
    }}
    .muted {{
      color: #ffffff;
      opacity: 0.88;
    }}
  </style>
</head>
<body>
  <div class="container">
    <div class="panel mx-auto p-4 p-md-5 text-center shadow-lg">
      <img class="logo mb-4" src="{logo_url}" alt="Logo">
      <div class="muted fw-semibold mb-2">{status_text}</div>
      <h1 class="h2 mb-3">{title_text}</h1>
      <p class="mb-4 muted">{message_text}</p>
      <p class="mb-0"><a class="btn btn-light" href="{instance_url}">Open Instance</a></p>
    </div>
  </div>
</body>
</html>
